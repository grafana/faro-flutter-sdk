name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*" # Matches version tags like v1.2.3, v1.2.3-beta.1

jobs:
  publish:
    name: Publish to pub.dev
    environment: pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # pub.dev OIDC + Sigstore signing for attest-build-provenance
      attestations: write # publish to GitHub attestations API
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # The dart-lang/setup-dart action provisions the OIDC token that
      # `dart pub publish` uses for pub.dev's trusted-publisher flow.
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      # The dart binary from a Flutter SDK can publish both Flutter and
      # pure-Dart packages; matches what the dart-lang/setup-dart reusable
      # workflow used before we inlined this job.
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable

      - name: Read package metadata
        id: pkg
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          name=$(awk '/^name:/ { print $2; exit }' pubspec.yaml | tr -d '\r')
          pubspec_version=$(awk '/^version:/ { print $2; exit }' pubspec.yaml | tr -d '\r')
          tag_version="${REF_NAME#v}"
          if [ -z "$name" ] || [ -z "$pubspec_version" ]; then
            echo "::error::Could not read package name or version from pubspec.yaml"
            exit 1
          fi
          if [ "$tag_version" != "$pubspec_version" ]; then
            echo "::error::Tag version ${tag_version} does not match pubspec.yaml version ${pubspec_version}"
            exit 1
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${pubspec_version}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: dart pub get

      - name: Publish - dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish -f

      # `dart pub publish` builds the archive in memory and uploads it; there
      # is no stable local path we can attest. After pub.dev has processed
      # the upload, download the canonical archive pub.dev serves and attest
      # those bytes. Consumers who fetch the package via `pub` get byte-
      # identical content and can verify the attestation with
      # `gh attestation verify <tarball> --repo grafana/faro-flutter-sdk`.
      - name: Fetch published archive from pub.dev
        id: fetch
        shell: bash
        env:
          NAME: ${{ steps.pkg.outputs.name }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          # pub.dev is eventually consistent — and the version metadata surfaces
          # *before* the published archive is downloadable, so polling only the
          # metadata API breaks the loop too early and the archive download then
          # 404s. publish is non-idempotent, so poll until BOTH the metadata is
          # queryable AND the tarball actually downloads before giving up.
          api_url="https://pub.dev/api/packages/${NAME}/versions/${VERSION}"
          expected_sha=""
          downloaded=""
          for attempt in {1..60}; do
            response=$(curl -fsSL "$api_url" || echo "")
            archive_url=$(echo "$response" | jq -r '.archive_url // empty')
            expected_sha=$(echo "$response" | jq -r '.archive_sha256 // empty')
            # curl -f exits non-zero on the transient archive 404; guarding it in
            # the `if` keeps `set -e` from killing the step so we retry instead.
            if [ -n "$archive_url" ] && curl -fsSL -o package.tar.gz "$archive_url"; then
              downloaded="yes"
              break
            fi
            echo "::notice::pub.dev has not fully surfaced ${NAME}@${VERSION} yet (attempt ${attempt}/60); sleeping 10s"
            sleep 10
          done
          if [ -z "$downloaded" ]; then
            echo "::error::pub.dev did not surface a downloadable ${NAME}@${VERSION} archive within ~10 minutes; published but unattested"
            exit 1
          fi
          if [ -z "$expected_sha" ]; then
            echo "::error::pub.dev surfaced ${NAME}@${VERSION} but did not return archive_sha256"
            exit 1
          fi
          actual_sha=$(sha256sum package.tar.gz | awk '{print $1}')
          if [ "$expected_sha" != "$actual_sha" ]; then
            echo "::error::sha256 mismatch: pub.dev reports ${expected_sha}, downloaded ${actual_sha}"
            exit 1
          fi
          echo "tarball=package.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attest provenance for pub.dev archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.fetch.outputs.tarball }}
