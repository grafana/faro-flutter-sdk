name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 6 * * MON'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-and-scan-sdk-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check out target revision
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: |
          target_sha="$(jq -r \
            '.pull_request.base.sha // .merge_group.base_sha // empty' \
            "$GITHUB_EVENT_PATH")"
          if [ -z "$target_sha" ]; then
            echo "::error::Could not determine target revision"
            exit 1
          fi
          git checkout "$target_sha"

      - name: Set up target branch Flutter
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: ./.github/actions/setup-flutter

      - name: Resolve target branch SDK dependencies
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: flutter pub get

      - name: Scan target branch SDK dependencies
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=sdk-old-results.json
            --lockfile=pubspec.lock

      - name: Check out current revision
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: git checkout -f "$CURRENT_SHA"
        env:
          CURRENT_SHA: ${{ github.sha }}

      - name: Set up current Flutter
        uses: ./.github/actions/setup-flutter

      - name: Resolve current SDK dependencies
        run: flutter pub get

      - name: Scan current SDK dependencies
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=sdk-new-results.json
            --lockfile=pubspec.lock

      - name: Report SDK dependency changes
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: google/osv-scanner-action/osv-reporter-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --output=sdk-results.sarif
            --old=sdk-old-results.json
            --new=sdk-new-results.json
            --gh-annotations=true
            --fail-on-vuln=true

      - name: Report SDK dependencies
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: google/osv-scanner-action/osv-reporter-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --output=sdk-results.sarif
            --new=sdk-new-results.json
            --gh-annotations=false
            --fail-on-vuln=true

      - name: Upload SDK scan artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SDK OSV Scanner SARIF file
          path: sdk-results.sarif
          retention-days: 5

      - name: Upload SDK scan to code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: osv-sdk-dependencies
          sarif_file: sdk-results.sarif

  scan-committed-lockfiles-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=example/pubspec.lock
        --lockfile=example/webview_demo/yarn.lock

  scan-committed-lockfiles:
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=example/pubspec.lock
        --lockfile=example/webview_demo/yarn.lock
