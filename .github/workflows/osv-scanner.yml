name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 6 * * MON'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-and-scan-sdk-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: ./.github/actions/setup-flutter

      - name: Resolve SDK dependencies
        run: flutter pub get

      - name: Scan SDK dependencies
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pub:pubspec.lock

  scan-committed-lockfiles-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=pub:example/pubspec.lock
        --lockfile=example/webview_demo/yarn.lock

  scan-committed-lockfiles:
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=pub:example/pubspec.lock
        --lockfile=example/webview_demo/yarn.lock
